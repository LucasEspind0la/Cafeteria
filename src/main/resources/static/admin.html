<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Cafeteria - Gestão de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="logo">☕ Cafeteria</div>
        <nav class="nav">
            <button class="nav-btn active" onclick="showSection('produtos')">Produtos</button>
            <button class="nav-btn" onclick="showSection('cadastro')">Novo Produto</button>
        </nav>
    </header>

    <!-- Seção: Lista de Produtos -->
    <section id="sec-produtos" class="section active">
        <div class="section-header">
            <h2>📦 Catálogo de Produtos</h2>
            <div class="filters">
                <input type="text" id="search" placeholder="🔍 Buscar produto..." oninput="filtrar()">
                <select id="filter-tipo" onchange="filtrar()">
                    <option value="">Todos</option>
                    <option value="Bebida">Bebidas</option>
                    <option value="Lanche">Lanches</option>
                    <option value="Doce">Doces</option>
                </select>
            </div>
        </div>

        <div id="loading" class="loading">Carregando...</div>
        <div id="lista-produtos" class="grid"></div>
    </section>

    <!-- Seção: Cadastro -->
    <section id="sec-cadastro" class="section">
        <div class="form-container">
            <h2>➕ Cadastrar Produto</h2>
            <form id="form-produto" onsubmit="salvar(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome *</label>
                        <input type="text" id="nome" required placeholder="Ex: Café Expresso">
                    </div>
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="">Selecione</option>
                            <option value="Bebida">Bebida</option>
                            <option value="Lanche">Lanche</option>
                            <option value="Doce">Doce</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Categoria *</label>
                        <input type="text" id="categoria" required placeholder="Ex: Quente, Gelado">
                    </div>
                    <div class="form-group">
                        <label>Preço (R$) *</label>
                        <input type="number" id="preco" step="0.01" min="0" required placeholder="5.00">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Estoque *</label>
                        <input type="number" id="estoque" min="0" required placeholder="50">
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" id="descricao" placeholder="Opcional">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="showSection('produtos')">Cancelar</button>
                    <button type="submit" class="btn-primary">💾 Salvar Produto</button>
                </div>
            </form>
        </div>
    </section>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
