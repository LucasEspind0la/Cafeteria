<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Café</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
            color: #6f4e37;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #6f4e37;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #5a3e2b;
        }
        .error {
            color: red;
            text-align: center;
            display: none;
            margin-bottom: 10px;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>☕ Login Café</h2>

    <div id="errorMsg" class="error">
        E-mail ou senha incorretos.
    </div>

    <form action="/login" method="post" autocomplete="off">
        <input type="text" style="display:none" autocomplete="username">
        <input type="password" style="display:none" autocomplete="new-password">

        <input type="text" name="username" placeholder="E-mail" autocomplete="off" required>
        <input type="password" name="password" placeholder="Senha" autocomplete="new-password" required>
        <button type="submit">Entrar</button>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        document.getElementById('errorMsg').classList.add('show');
    }
</script>

</body>
</html>
